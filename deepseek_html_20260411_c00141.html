<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Htxh-1chat — чат и звонки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        :root {
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-input: #252525;
            --border: #333;
            --text: #e0e0e0;
            --text-dim: #aaa;
            --accent: #3a6ea5;
            --accent-hover: #4d7db8;
            --danger: #9e3a3a;
            --danger-hover: #b14545;
            --success: #2e7d64;
            --online: #2ecc71;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .auth-container, .chat-container {
            padding: 30px;
        }

        .auth-box {
            max-width: 420px;
            margin: 0 auto;
            background: var(--bg-dark);
            padding: 32px;
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 28px;
            font-size: 24px;
        }

        input, button {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(58,110,165,0.2);
        }

        button {
            background: var(--accent);
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #2c2c2c;
        }
        .btn-secondary:hover {
            background: #3a3a3a;
        }
        .btn-danger {
            background: var(--danger);
        }
        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .captcha-box {
            background: #111;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-family: monospace;
            font-size: 28px;
            letter-spacing: 8px;
            margin-bottom: 12px;
            color: #eee;
        }

        .chat-layout {
            display: flex;
            height: 70vh;
            min-height: 500px;
        }

        .friends-sidebar {
            width: 280px;
            background: var(--bg-dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .user-info {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: #141414;
        }

        .friend-list {
            flex: 1;
            overflow-y: auto;
        }

        .friend-item {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: 0.1s;
        }
        .friend-item:hover {
            background: #202020;
        }
        .friend-name {
            font-weight: 500;
        }
        .online-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            display: inline-block;
            margin-right: 8px;
        }
        .online-status.online {
            background: var(--online);
        }
        .add-friend-form {
            padding: 16px;
            display: flex;
            gap: 8px;
            flex-direction: column;
        }
        .add-friend-form .search-row {
            display: flex;
            gap: 8px;
        }
        .add-friend-form .search-row input {
            margin-bottom: 0;
            flex: 1;
        }
        .add-friend-form .search-row button {
            width: auto;
            padding: 12px 16px;
            margin-bottom: 0;
        }
        .user-suggestions {
            background: var(--bg-input);
            border-radius: 12px;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 5px;
        }
        .suggestion-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .suggestion-item:hover {
            background: var(--accent);
        }
        .info-text {
            font-size: 12px;
            color: var(--text-dim);
            padding: 5px 10px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: #151515;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            background: #252525;
            align-self: flex-start;
        }
        .message.own {
            align-self: flex-end;
            background: var(--accent);
        }
        .message-sender {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .message-input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background: #121212;
        }
        .message-input-area input {
            margin-bottom: 0;
        }
        .message-input-area button {
            width: auto;
            margin-bottom: 0;
            padding: 12px 20px;
        }

        .call-controls {
            display: flex;
            gap: 10px;
        }
        .call-btn {
            background: #2c3e2c;
            width: auto;
            padding: 8px 16px;
            font-size: 13px;
        }

        .incoming-call {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e1e2f;
            border-radius: 20px;
            padding: 16px 24px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 10px 25px black;
            z-index: 1000;
        }

        .hidden {
            display: none;
        }

        .status-badge {
            font-size: 12px;
            margin-left: 8px;
            color: var(--text-dim);
        }

        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #2e7d64;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 700px) {
            .chat-layout {
                flex-direction: column;
                height: auto;
            }
            .friends-sidebar {
                width: 100%;
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="authSection" class="auth-container">
        <div class="auth-box">
            <h1>Htxh-1chat</h1>
            <div class="sub">☺</div>
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Имя пользователя" autocomplete="off">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginBtn">Войти</button>
                <button id="showRegisterBtn" class="btn-secondary">Нет аккаунта? Регистрация</button>
            </div>
            <div id="registerForm" class="hidden">
                <input type="text" id="regUsername" placeholder="Имя пользователя">
                <input type="password" id="regPassword" placeholder="Пароль">
                <div class="captcha-box" id="captchaDisplay">XXXX</div>
                <input type="text" id="captchaInput" placeholder="Введите капчу">
                <button id="registerBtn">Зарегистрироваться</button>
                <button id="backToLoginBtn" class="btn-secondary">Назад</button>
            </div>
        </div>
    </div>

    <div id="chatSection" class="chat-container hidden">
        <div class="chat-layout">
            <div class="friends-sidebar">
                <div class="user-info">
                    <strong id="currentUsername"></strong>
                    <span class="status-badge" id="connectionStatus">🔘 офлайн</span>
                    <button id="logoutBtn" class="btn-secondary" style="margin-top:10px; padding:6px;">Выйти</button>
                </div>
                <div class="friend-list" id="friendListContainer"></div>
                <div class="add-friend-form">
                    <div class="search-row">
                        <input type="text" id="addFriendInput" placeholder="Имя друга для поиска" autocomplete="off">
                        <button id="addFriendBtn">➕</button>
                    </div>
                    <div id="suggestionsContainer" class="user-suggestions hidden"></div>
                    <div class="info-text" id="searchInfo"></div>
                </div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <div><span id="chatWithLabel">Не выбран друг</span></div>
                    <div class="call-controls">
                        <button id="callBtn" class="call-btn" disabled>🎧 Позвонить</button>
                        <button id="hangupBtn" class="call-btn btn-danger hidden" disabled>📞 Положить трубку</button>
                    </div>
                </div>
                <div class="messages" id="messagesArea">
                    <div class="message">Выберите друга для переписки</div>
                </div>
                <div class="message-input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                    <button id="sendMsgBtn" disabled>Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="incomingCallModal" class="incoming-call hidden">
        <div>📞 Входящий звонок от <strong id="callerName"></strong></div>
        <div style="margin-top:12px; display:flex; gap:10px;">
            <button id="acceptCallBtn" style="background:#2e7d64;">Принять</button>
            <button id="rejectCallBtn" class="btn-danger">Отклонить</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // Htxh-1chat — с поиском пользователей без учёта регистра
    // ============================================================

    let currentUser = null;
    let currentFriend = null;
    let localStream = null;
    let peerConnection = null;
    let currentCall = null;
    let bcChannel = null;
    let onlineFriends = new Set();
    let heartbeatInterval = null;
    let allUsersList = []; // кеш всех пользователей
    
    // ---- Работа с localStorage ----
    function getUsers() {
        return JSON.parse(localStorage.getItem('htxh_users_v4') || '[]');
    }
    function saveUsers(users) {
        localStorage.setItem('htxh_users_v4', JSON.stringify(users));
        updateUsersCache();
    }
    
    function updateUsersCache() {
        allUsersList = getUsers().map(u => u.username);
    }
    
    function initDefaultUsers() {
        if(!localStorage.getItem('htxh_users_v4')) {
            const defaultUsers = [
                { username: 'alex', password: '123', friends: ['maria'], messages: { maria: [] } },
                { username: 'maria', password: '123', friends: ['alex'], messages: { alex: [] } }
            ];
            saveUsers(defaultUsers);
        } else {
            updateUsersCache();
        }
    }
    
    // Поиск пользователя без учёта регистра
    function findUser(username) {
        const users = getUsers();
        // Сначала точное совпадение
        let user = users.find(u => u.username === username);
        if(user) return user;
        // Затем без учёта регистра
        return users.find(u => u.username.toLowerCase() === username.toLowerCase());
    }
    
    // Получить точное имя пользователя (с правильным регистром)
    function getExactUsername(searchName) {
        const users = getUsers();
        const found = users.find(u => u.username.toLowerCase() === searchName.toLowerCase());
        return found ? found.username : null;
    }
    
    function updateUserInStorage(updatedUser) {
        const users = getUsers();
        const index = users.findIndex(u => u.username === updatedUser.username);
        if(index !== -1) {
            users[index] = updatedUser;
            saveUsers(users);
        }
        broadcast({ type: 'user_updated', username: updatedUser.username });
    }
    
    function updateCurrentUserInStorage() {
        if(currentUser) updateUserInStorage(currentUser);
    }
    
    // ---- Поиск и подсказки ----
    function searchUsers(query) {
        if(!query || query.length < 1) return [];
        const lowerQuery = query.toLowerCase();
        return allUsersList.filter(name => 
            name.toLowerCase().includes(lowerQuery) && 
            name !== currentUser.username &&
            !currentUser.friends.includes(name)
        );
    }
    
    function showSuggestions() {
        const input = document.getElementById('addFriendInput');
        const query = input.value.trim();
        const suggestions = searchUsers(query);
        const container = document.getElementById('suggestionsContainer');
        const infoDiv = document.getElementById('searchInfo');
        
        if(suggestions.length > 0 && query.length > 0) {
            container.classList.remove('hidden');
            container.innerHTML = suggestions.map(name => 
                `<div class="suggestion-item" data-username="${name}">👤 ${name}</div>`
            ).join('');
            infoDiv.innerHTML = `🔍 Найдено: ${suggestions.length} пользователь(ей)`;
            
            // Добавляем обработчики
            document.querySelectorAll('.suggestion-item').forEach(el => {
                el.onclick = () => {
                    input.value = el.dataset.username;
                    container.classList.add('hidden');
                    addFriend(el.dataset.username);
                };
            });
        } else if(query.length > 0) {
            container.classList.add('hidden');
            const exactMatch = getExactUsername(query);
            if(exactMatch && exactMatch !== currentUser.username && !currentUser.friends.includes(exactMatch)) {
                infoDiv.innerHTML = `💡 Нажмите ➕ чтобы добавить "${exactMatch}"`;
            } else if(exactMatch === currentUser.username) {
                infoDiv.innerHTML = `⚠️ Это вы сами`;
            } else if(currentUser.friends.includes(exactMatch)) {
                infoDiv.innerHTML = `✅ Уже в друзьях`;
            } else {
                infoDiv.innerHTML = `❌ Пользователь "${query}" не найден. Попробуйте другой ник`;
            }
        } else {
            container.classList.add('hidden');
            infoDiv.innerHTML = `📋 Всего пользователей: ${allUsersList.length - 1} (кроме вас)`;
        }
    }
    
    // ---- Добавление в друзья с поиском без учёта регистра ----
    function addFriend(friendName) {
        if(!friendName || friendName.trim() === '') {
            alert('❌ Введите имя друга');
            return false;
        }
        
        if(friendName === currentUser.username) {
            alert('❌ Нельзя добавить самого себя');
            return false;
        }
        
        // Ищем пользователя с правильным регистром
        const exactFriendName = getExactUsername(friendName);
        if(!exactFriendName) {
            alert(`❌ Пользователь "${friendName}" не найден!\n\n💡 Совет: проверьте правильность написания. Регистр не важен, но имя должно существовать.`);
            // Показываем всех пользователей для подсказки
            const otherUsers = allUsersList.filter(u => u !== currentUser.username);
            if(otherUsers.length > 0) {
                alert(`📋 Существующие пользователи: ${otherUsers.join(', ')}`);
            }
            return false;
        }
        
        if(currentUser.friends.includes(exactFriendName)) {
            alert(`⚠️ ${exactFriendName} уже у вас в друзьях`);
            return false;
        }
        
        const targetUser = findUser(exactFriendName);
        if(!targetUser) {
            alert('❌ Ошибка: пользователь не найден в базе');
            return false;
        }
        
        // Добавляем друга текущему пользователю
        currentUser.friends.push(exactFriendName);
        if(!currentUser.messages[exactFriendName]) currentUser.messages[exactFriendName] = [];
        
        // Также добавляем текущего пользователя в друзья к targetUser (взаимно)
        if(!targetUser.friends.includes(currentUser.username)) {
            targetUser.friends.push(currentUser.username);
            if(!targetUser.messages[currentUser.username]) targetUser.messages[currentUser.username] = [];
            updateUserInStorage(targetUser);
            showNotification(`✨ ${exactFriendName} теперь тоже добавил вас в друзья!`);
        } else {
            showNotification(`✓ ${exactFriendName} уже был у вас в друзьях!`);
        }
        
        updateCurrentUserInStorage();
        renderFriendsList();
        
        // Очищаем поле и подсказки
        document.getElementById('addFriendInput').value = '';
        document.getElementById('suggestionsContainer').classList.add('hidden');
        
        broadcast({
            type: 'friend_added',
            from: currentUser.username,
            to: exactFriendName
        });
        
        alert(`✅ ${exactFriendName} добавлен в друзья!`);
        return true;
    }
    
    function handleFriendAdded(fromUsername) {
        if(!currentUser.friends.includes(fromUsername)) {
            currentUser.friends.push(fromUsername);
            if(!currentUser.messages[fromUsername]) currentUser.messages[fromUsername] = [];
            updateCurrentUserInStorage();
            renderFriendsList();
            showNotification(`📌 ${fromUsername} добавил вас в друзья!`);
        }
    }
    
    function showNotification(message) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.innerText = message;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }
    
    // ---- Капча ----
    function generateCaptcha() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
        let captcha = '';
        for(let i=0; i<5; i++) captcha += chars[Math.floor(Math.random() * chars.length)];
        return captcha;
    }
    let currentCaptcha = '';
    function refreshCaptcha() {
        currentCaptcha = generateCaptcha();
        const captchaElem = document.getElementById('captchaDisplay');
        if(captchaElem) captchaElem.innerText = currentCaptcha;
    }
    
    // ---- Auth ----
    function register(username, password, captchaInput) {
        if(captchaInput !== currentCaptcha) {
            alert('❌ Неверная капча');
            refreshCaptcha();
            return false;
        }
        const users = getUsers();
        if(users.find(u => u.username.toLowerCase() === username.toLowerCase())) {
            alert('❌ Пользователь с таким именем уже существует');
            refreshCaptcha();
            return false;
        }
        if(username.length < 3 || password.length < 3) {
            alert('❌ Имя и пароль минимум 3 символа');
            return false;
        }
        const newUser = { username, password, friends: [], messages: {} };
        users.push(newUser);
        saveUsers(users);
        alert('✅ Регистрация успешна! Теперь войдите.');
        return true;
    }
    
    function login(username, password) {
        const user = findUser(username);
        if(user && user.password === password) {
            currentUser = JSON.parse(JSON.stringify(user));
            sessionStorage.setItem('htxh_session', currentUser.username);
            startLocalSignaling();
            showChatInterface();
            return true;
        } else {
            alert('❌ Неверные имя или пароль');
            return false;
        }
    }
    
    function logout() {
        if(peerConnection) peerConnection?.close();
        if(localStream) localStream.getTracks().forEach(track => track.stop());
        if(heartbeatInterval) clearInterval(heartbeatInterval);
        if(bcChannel) bcChannel.close();
        onlineFriends.clear();
        currentCall = null;
        sessionStorage.removeItem('htxh_session');
        currentUser = null;
        currentFriend = null;
        showAuthInterface();
    }
    
    // ---- BroadcastChannel ----
    function startLocalSignaling() {
        if(bcChannel) bcChannel.close();
        bcChannel = new BroadcastChannel('htxh_signaling_v4');
        bcChannel.onmessage = (event) => {
            const data = event.data;
            handleSignalingMessage(data);
        };
        broadcast({ type: 'user_status', username: currentUser.username, status: 'online' });
        heartbeatInterval = setInterval(() => {
            broadcast({ type: 'user_status', username: currentUser.username, status: 'online' });
        }, 10000);
        document.getElementById('connectionStatus').innerHTML = '🟢 онлайн';
    }
    
    function broadcast(msg) {
        if(bcChannel) bcChannel.postMessage(msg);
    }
    
    function handleSignalingMessage(data) {
        switch(data.type) {
            case 'user_status':
                if(data.username !== currentUser?.username) {
                    if(data.status === 'online') {
                        onlineFriends.add(data.username);
                        updateFriendOnlineUI(data.username, true);
                    } else {
                        onlineFriends.delete(data.username);
                        updateFriendOnlineUI(data.username, false);
                    }
                }
                break;
            case 'friend_added':
                if(data.to === currentUser?.username) handleFriendAdded(data.from);
                break;
            case 'call_offer':
                if(data.to === currentUser?.username) handleIncomingCallLocal(data);
                break;
            case 'call_answer':
                if(data.to === currentUser?.username && currentCall?.type === 'outgoing') handleCallAnswerLocal(data);
                break;
            case 'ice_candidate':
                if(data.to === currentUser?.username && peerConnection) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e=>console.warn);
                }
                break;
            case 'call_end':
                if(data.to === currentUser?.username) endCall();
                break;
            case 'user_updated':
                if(data.username === currentUser?.username) {
                    const fresh = findUser(currentUser.username);
                    if(fresh) {
                        currentUser = JSON.parse(JSON.stringify(fresh));
                        if(currentFriend) renderMessages(currentFriend);
                        renderFriendsList();
                    }
                }
                break;
            case 'new_message':
                if(data.to === currentUser?.username) receiveMessageLocal(data.from, data.message);
                break;
        }
    }
    
    function updateFriendOnlineUI(username, isOnline) {
        const friendDivs = document.querySelectorAll('.friend-item');
        for(let div of friendDivs) {
            const nameSpan = div.querySelector('.friend-name');
            if(nameSpan && nameSpan.innerText === username) {
                const statusSpan = div.querySelector('.online-status');
                if(statusSpan) {
                    if(isOnline) statusSpan.classList.add('online');
                    else statusSpan.classList.remove('online');
                }
            }
        }
    }
    
    // ---- Сообщения ----
    function sendMessageLocal(toFriend, text) {
        if(!text.trim()) return;
        const message = { from: currentUser.username, text: text, time: Date.now() };
        if(!currentUser.messages[toFriend]) currentUser.messages[toFriend] = [];
        currentUser.messages[toFriend].push(message);
        updateCurrentUserInStorage();
        broadcast({ type: 'new_message', to: toFriend, from: currentUser.username, message: message });
        renderMessages(toFriend);
        document.getElementById('messageInput').value = '';
    }
    
    function receiveMessageLocal(from, message) {
        if(!currentUser.messages[from]) currentUser.messages[from] = [];
        currentUser.messages[from].push(message);
        updateCurrentUserInStorage();
        if(currentFriend === from) renderMessages(from);
        showNotification(`📩 Новое сообщение от ${from}`);
    }
    
    // ---- WebRTC звонки (упрощённо) ----
    async function startCallLocal(toUser) {
        if(currentCall) { alert('Уже есть активный звонок'); return; }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            createPeerConnectionLocal();
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            broadcast({ type: 'call_offer', from: currentUser.username, to: toUser, offer: offer });
            currentCall = { with: toUser, type: 'outgoing' };
            updateCallUI(true);
        } catch(err) {
            alert('❌ Нет доступа к микрофону');
        }
    }
    
    async function handleIncomingCallLocal(data) {
        if(currentCall) { broadcast({ type: 'call_busy', from: currentUser.username, to: data.from }); return; }
        currentCall = { with: data.from, type: 'incoming', offer: data.offer };
        document.getElementById('callerName').innerText = data.from;
        document.getElementById('incomingCallModal').classList.remove('hidden');
        
        const acceptBtn = document.getElementById('acceptCallBtn');
        const rejectBtn = document.getElementById('rejectCallBtn');
        const newAccept = acceptBtn.cloneNode(true);
        const newReject = rejectBtn.cloneNode(true);
        acceptBtn.parentNode.replaceChild(newAccept, acceptBtn);
        rejectBtn.parentNode.replaceChild(newReject, rejectBtn);
        
        newAccept.onclick = async () => {
            document.getElementById('incomingCallModal').classList.add('hidden');
            await acceptCallLocal(data.from, data.offer);
        };
        newReject.onclick = () => {
            document.getElementById('incomingCallModal').classList.add('hidden');
            broadcast({ type: 'call_reject', from: currentUser.username, to: data.from });
            currentCall = null;
        };
    }
    
    async function acceptCallLocal(from, offer) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            createPeerConnectionLocal();
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            broadcast({ type: 'call_answer', from: currentUser.username, to: from, answer: answer });
            currentCall = { with: from, type: 'active' };
            updateCallUI(true);
        } catch(err) { console.error(err); }
    }
    
    async function handleCallAnswerLocal(data) {
        if(peerConnection && currentCall?.type === 'outgoing') {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            currentCall.type = 'active';
        }
    }
    
    function createPeerConnectionLocal() {
        peerConnection = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]
        });
        peerConnection.ontrack = (event) => {
            const audio = new Audio();
            audio.srcObject = event.streams[0];
            audio.play().catch(e=>console.log);
        };
        peerConnection.onicecandidate = (event) => {
            if(event.candidate && currentCall) {
                broadcast({ type: 'ice_candidate', from: currentUser.username, to: currentCall.with, candidate: event.candidate });
            }
        };
        peerConnection.onconnectionstatechange = () => {
            if(peerConnection?.connectionState === 'disconnected' || peerConnection?.connectionState === 'failed') endCall();
        };
    }
    
    function endCall() {
        peerConnection?.close();
        peerConnection = null;
        localStream?.getTracks().forEach(track => track.stop());
        localStream = null;
        if(currentCall?.with) broadcast({ type: 'call_end', from: currentUser.username, to: currentCall.with });
        currentCall = null;
        updateCallUI(false);
        document.getElementById('incomingCallModal').classList.add('hidden');
    }
    
    function updateCallUI(inCall) {
        const callBtn = document.getElementById('callBtn');
        const hangupBtn = document.getElementById('hangupBtn');
        if(inCall) {
            callBtn.classList.add('hidden');
            hangupBtn.classList.remove('hidden');
            hangupBtn.disabled = false;
        } else {
            callBtn.classList.remove('hidden');
            hangupBtn.classList.add('hidden');
            hangupBtn.disabled = true;
            if(currentFriend) callBtn.disabled = false;
        }
    }
    
    // ---- UI ----
    function renderFriendsList() {
        const container = document.getElementById('friendListContainer');
        if(!container) return;
        if(!currentUser.friends.length) {
            container.innerHTML = '<div style="padding:16px;color:#888;">😢 Нет друзей. Найдите друга через поиск выше!</div>';
            return;
        }
        container.innerHTML = '';
        currentUser.friends.forEach(f => {
            const isOnline = onlineFriends.has(f);
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `<div><span class="online-status ${isOnline ? 'online' : ''}"></span><span class="friend-name">${escapeHtml(f)}</span></div>`;
            div.onclick = () => openChatWith(f);
            container.appendChild(div);
        });
    }
    
    function openChatWith(friendName) {
        currentFriend = friendName;
        document.getElementById('chatWithLabel').innerText = `Чат с ${friendName}`;
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendMsgBtn').disabled = false;
        document.getElementById('callBtn').disabled = false;
        renderMessages(friendName);
    }
    
    function renderMessages(friendName) {
        const messagesArea = document.getElementById('messagesArea');
        if(!messagesArea) return;
        const msgs = currentUser.messages[friendName] || [];
        if(msgs.length === 0) {
            messagesArea.innerHTML = '<div class="message">💬 Нет сообщений. Напишите первым!</div>';
            return;
        }
        messagesArea.innerHTML = '';
        msgs.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.from === currentUser.username ? 'own' : ''}`;
            msgDiv.innerHTML = `<div class="message-sender">${msg.from === currentUser.username ? 'Вы' : msg.from}</div><div>${escapeHtml(msg.text)}</div><div style="font-size:10px;color:#888;margin-top:4px;">${new Date(msg.time).toLocaleTimeString()}</div>`;
            messagesArea.appendChild(msgDiv);
        });
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function showAuthInterface() {
        document.getElementById('authSection').classList.remove('hidden');
        document.getElementById('chatSection').classList.add('hidden');
        refreshCaptcha();
    }
    
    function showChatInterface() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('chatSection').classList.remove('hidden');
        document.getElementById('currentUsername').innerText = currentUser.username;
        renderFriendsList();
        if(currentFriend) renderMessages(currentFriend);
        else {
            document.getElementById('messagesArea').innerHTML = '<div class="message">👋 Выберите друга из списка или найдите нового через поиск</div>';
            document.getElementById('messageInput').disabled = true;
            document.getElementById('sendMsgBtn').disabled = true;
            document.getElementById('callBtn').disabled = true;
        }
        updateCallUI(false);
        
        // Обновляем информацию о поиске
        const infoDiv = document.getElementById('searchInfo');
        if(infoDiv) infoDiv.innerHTML = `📋 Всего пользователей: ${allUsersList.length - 1} (кроме вас)`;
    }
    
    // ---- Инициализация ----
    document.addEventListener('DOMContentLoaded', () => {
        initDefaultUsers();
        
        // Поиск при вводе
        const searchInput = document.getElementById('addFriendInput');
        if(searchInput) {
            searchInput.addEventListener('input', () => showSuggestions());
            searchInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    addFriend(searchInput.value);
                }
            });
        }
        
        const savedSession = sessionStorage.getItem('htxh_session');
        if(savedSession) {
            const user = findUser(savedSession);
            if(user) { currentUser = JSON.parse(JSON.stringify(user)); startLocalSignaling(); showChatInterface(); }
            else showAuthInterface();
        } else showAuthInterface();
        
        document.getElementById('loginBtn').onclick = () => login(document.getElementById('loginUsername').value.trim(), document.getElementById('loginPassword').value);
        document.getElementById('showRegisterBtn').onclick = () => { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); refreshCaptcha(); };
        document.getElementById('backToLoginBtn').onclick = () => { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('registerForm').classList.add('hidden'); };
        document.getElementById('registerBtn').onclick = () => { if(register(document.getElementById('regUsername').value.trim(), document.getElementById('regPassword').value, document.getElementById('captchaInput').value.trim())) { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('registerForm').classList.add('hidden'); } };
        document.getElementById('logoutBtn').onclick = () => logout();
        document.getElementById('addFriendBtn').onclick = () => addFriend(document.getElementById('addFriendInput').value.trim());
        document.getElementById('sendMsgBtn').onclick = () => { if(currentFriend) sendMessageLocal(currentFriend, document.getElementById('messageInput').value); };
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter' && currentFriend) sendMessageLocal(currentFriend, e.target.value); });
        document.getElementById('callBtn').onclick = () => { if(currentFriend) startCallLocal(currentFriend); };
        document.getElementById('hangupBtn').onclick = () => endCall();
    });
</script>
</body>
